# Setup
title: PingBackHome
url: https://PingBackHome.github.io/home
# paginate: 1
baseurl: "/"
permalink: pretty

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-github-contributions

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# ga_analytics: UA-000000-0

# Specify the author for blog posts
author:
  name: PingBackHome
  url: https://twitter.com/CGljaw
  email: noneed4mail@nomail.org
  
githubcontributions:
  username: PingBackHome # Github username
  page_limit: 3 # Number of pages of data to grab from Github
  cache: 300 # Number of seconds to cache the data file
  
# Custom vars
version: 3.0.0

# Navbar page list
nav:
  - title: Home
    url: /home
    
  - title: Writeups
    url: /categories
   
  - title: Archive
    url: /archive
    
  - title: About
    url: /about
